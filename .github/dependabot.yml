version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      uswds:
        patterns:
          - "@uswds/*"
          - "uswds"
      vite-and-build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "axe-core"
    ignore:
      - dependency-name: "uswds"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@uswds/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
